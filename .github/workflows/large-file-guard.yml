# ITM-028 - large-file CI guard. Custom shell step (decided round 3).
# Threshold: 1 MB. Allowlist: docs/assets/ only.

name: large-file-guard

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: large-file-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: reject-files-over-1mb
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          # Need full diff range to inspect added files.
          fetch-depth: 0

      - name: Reject new files over 1 MB outside docs/assets/
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          THRESHOLD_BYTES: 1048576  # 1 MB
          ALLOWLIST_PREFIX: docs/assets/
        run: |
          set -euo pipefail
          # Skip if BASE_SHA is empty (first push to branch) or all-zeros.
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            echo "INFO: no base sha; skipping large-file guard"
            exit 0
          fi
          ADDED=$(git diff --name-only --diff-filter=A "${BASE_SHA}...${HEAD_SHA}" || true)
          FAILED=0
          for FILE in ${ADDED}; do
            # Skip if missing (e.g., deleted later in same PR).
            [ -f "${FILE}" ] || continue
            # Skip files under the allowlist prefix.
            case "${FILE}" in
              "${ALLOWLIST_PREFIX}"*) continue ;;
            esac
            SIZE=$(wc -c <"${FILE}" | tr -d ' ')
            if [ "${SIZE}" -gt "${THRESHOLD_BYTES}" ]; then
              echo "FAIL: ${FILE} is ${SIZE} bytes (>${THRESHOLD_BYTES}); not under ${ALLOWLIST_PREFIX}"
              FAILED=1
            fi
          done
          if [ "${FAILED}" -ne 0 ]; then
            echo ""
            echo "Add the file under ${ALLOWLIST_PREFIX} if it's intentional, or remove it from the PR."
            exit 1
          fi
          echo "PASS: no new files over 1 MB outside ${ALLOWLIST_PREFIX}"
