name: Update Contributors

on:
  push:
    branches: [main]
    paths-ignore:
      - CONTRIBUTORS.md
      - .contributors.jsonl
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  contributors-please:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update contributors
        uses: smorinlabs/contributors-please-action@v1.1.0
        with:
          app-id: ${{ secrets.CONTRIBUTORS_PLEASE_APP_ID }}
          private-key: ${{ secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY }}
          pat: ${{ secrets.CONTRIBUTORS_PLEASE_PAT }}
          output-file: CONTRIBUTORS.md
          state-file: .contributors.jsonl
          config-file: .contributors.yml
          mode: pull-request
          # Override the action's default ("docs: update contributors
          # [skip ci]"): [skip ci] suppresses the pull_request workflows
          # behind main's required checks, leaving the bot PR permanently
          # blocked. Loop protection comes from paths-ignore above, not
          # from [skip ci].
          commit-message: "docs: update contributors"
