# Blueprint guard CI — pins the contract between init/ and downstream projects.
#
# This workflow is *blueprint-only*: `check_no_marker.sh` is scoped to the
# `*/py-launch-blueprint` repo via $GITHUB_REPOSITORY (auto-set by GitHub
# Actions), and `init --prune` deletes this whole file during migration.
# Layered defense against either path being missed.

name: blueprint-guard

on:
  push:
    branches: [main]
  pull_request:
  merge_group:  # required checks must also report on the merge queue's speculative merge
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: '1.51.0'  # pin — Tier-1 depends on eager :=

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check 1 — marker absence (no `init` was run on the blueprint)
        # $GITHUB_REPOSITORY is auto-set by Actions; check_no_marker.sh reads it.
        run: bash init/ci/check_no_marker.sh

      - name: Check 2 — guard wiring lint
        run: uv run python init/ci/check_guard_wiring.py

      - name: Check 3 — Tier-1 regression (banner fires on every recipe)
        shell: bash
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          cp -R Justfile init "$tmp/"
          cd "$tmp"
          git init -q
          git remote add origin git@github.com:fixture/un-migrated.git
          # --list / --summary must NOT evaluate variables — banner stays silent.
          just --list >/tmp/stdout 2>/tmp/stderr || true
          if grep -q "blueprint un-initialized" /tmp/stderr; then
            echo "FAIL: Tier-1 banner fired on --list (should be silent on introspection)"
            exit 1
          fi
          # A real recipe run MUST trigger the banner (pins eager-evaluation behavior).
          just debug-info >/tmp/stdout 2>/tmp/stderr || true
          if ! grep -q "blueprint un-initialized" /tmp/stderr; then
            echo "FAIL: Tier-1 banner did NOT fire on recipe run"
            echo "--- stderr ---"
            cat /tmp/stderr
            exit 1
          fi
          echo "ok: Tier-1 silent on --list; fires on recipe."

      - name: Check 4 — manifest drift
        run: uv run python init/ci/check_manifest_drift.py

      - name: Check 5 — init-integration path filter completeness
        # If init-integration.yml ever re-introduces a `paths:` filter, this
        # check ensures it covers every manifest-referenced file. In strict
        # mode (no paths filter), the check passes trivially.
        run: uv run init/ci/check_path_filter.py

  unit-tests:
    # Runs in parallel with `guard`. Pytest suite under init/tests/ exercises
    # the 5 §4.7 instantiation modes (subprocess against tmp fixtures) plus
    # the manifest schema and doctor checks. ~5s locally; expect ~30-60s here
    # once uv has provisioned the PEP-723 script deps (questionary/rich/tomlkit).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install just
        # Needed because some fixtures shell out to `just` (Tier-1 banner tests).
        uses: extractions/setup-just@v4
        with:
          just-version: '1.51.0'

      - name: Run init/tests/ (5 §4.7 modes + manifest + doctor)
        # --override-ini drops the project default `-m 'not slow and not live'`;
        # init/tests are not marked and need to run unconditionally here.
        run: uv run pytest init/tests/ --override-ini="addopts=" -v
