# CI/CD - per-job split (ITM-024 hardening + ITM-025 lint + ITM-026 ty +
# ITM-030 matrix). Hygiene tools live in their own workflows (ITM-011/014/017).
#
# WL-001/WL-002: tool versions come from uv.lock (`uv sync --locked` +
# `uv run --no-sync`), never floating `uvx` — CI matches local hooks exactly.
# WL-006/WL-019: `changes` gates the heavy jobs on docs-only PRs; `ci-ok` is
# the single required status for branch protection (skipped jobs count as ok).

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # The merge queue emits merge_group (not pull_request) for its speculative
  # merge — without this trigger the ci-ok required check never reports and
  # every queue entry deadlocks at "Expected".
  merge_group:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # WL-019 - detect whether the diff touches anything beyond docs/prose, so
  # the expensive jobs (test matrix, typecheck, build) skip on docs-only PRs.
  # Shell-based (same pattern as large-file-guard) - no third-party action.
  # On push to main everything always runs.
  changes:
    name: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need the PR base to diff against
      - name: Detect code changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "INFO: ${EVENT_NAME} event - running all jobs"
            exit 0
          fi
          # Skip-list: paths that can never affect lint/types/tests/build.
          # Anything NOT matching these patterns counts as a code change.
          # README.md is markdown but NOT skippable: it's `project.readme`,
          # a packaging input that build-smoke must validate (CodeRabbit).
          skip='^docs/|^assets/|^\.vscode/|^\.cursor/|^\.windsurf|\.md$'
          skip="$skip|^LICENSE$|^\.github/ISSUE_TEMPLATE/"
          # .contributors.jsonl is contributors-please's generated ledger -
          # bookkeeping only, so the weekly bot PR stays on the docs-only
          # fast path now that its commits no longer carry [skip ci].
          skip="$skip|^\.contributors\.jsonl$"
          changed="$(git diff --name-only "${BASE_SHA}...HEAD")"
          if printf '%s\n' "$changed" | grep -qx 'README\.md' \
              || printf '%s\n' "$changed" \
              | grep -vE "$skip" \
              | grep -q .; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "INFO: code paths changed - running all jobs"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "INFO: docs-only diff - skipping heavy jobs"
          fi

  # ITM-025 - lint job (ruff check + format --check). Decided round 3 (option B).
  # Always runs (fast) - ruff also lints docs snippets and init/ tooling.
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync locked dev tools
        run: uv sync --locked --only-group dev
      - name: Ruff check
        run: uv run --no-sync ruff check .
      - name: Ruff format check
        run: uv run --no-sync ruff format --check .

  # ITM-026 - typecheck job (ty, per ADR-03). Decided round 3 direct switch.
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync dev env (ty needs project deps on the python path)
        run: uv sync --locked --group dev --extra web
      - name: ty check
        run: uv run --no-sync ty check src/py_launch_blueprint/

  # ITM-030 - test matrix: ubuntu + macOS x py3.12/3.13 (decided round 3);
  # windows added alongside the platform-native default paths (REC-24).
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      id-token: write  # OIDC for tokenless Codecov upload (public repo)
    strategy:
      fail-fast: false  # see all failures, not just the first (round-3)
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dev env
        run: uv sync --locked --group dev --extra web  # PEP 735; web extra covers web/
      - name: Run tests with coverage
        # Default skips slow/live markers (ITM-046 addopts); CI runs everything.
        run: uv run --no-sync pytest -m "" --cov=py_launch_blueprint --cov-report=xml
      - name: Upload coverage to Codecov
        # Single matrix combo uploads (avoids 4x duplicate reports).
        # use_oidc: tokenless upload (public repo). Requires `id-token: write`.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7.0.0
        with:
          use_oidc: true
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # WL-004 - build + install smoke test. Catches packaging breakage (missing
  # files, broken entry point, bad metadata) at PR time instead of at the
  # release tag. uv end-to-end: uv build -> twine metadata check (locked via
  # dev group) -> install wheel AND sdist into fresh envs and run the CLI.
  build-smoke:
    name: build-smoke
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build sdist + wheel
        run: uv build
      - name: Sync locked dev tools
        run: uv sync --locked --only-group dev
      - name: Check dist metadata (twine)
        run: uv run --no-sync twine check dist/*
      - name: Smoke test wheel install
        run: uvx --from "$(ls dist/*.whl)" plbp --version
      - name: Smoke test sdist install
        run: uvx --from "$(ls dist/*.tar.gz)" plbp --version

  # WL-021 - docs build with warnings-as-errors. Broken cross-references and
  # autodoc failures block the PR instead of surfacing on ReadTheDocs after
  # merge. Link checking is external-network-flaky, so it lives in the weekly
  # workflow (dep-audit.yml) instead of here.
  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync docs env (web extra so autodoc imports resolve)
        run: uv sync --locked --group docs --extra web
      - name: Sphinx build (warnings are errors)
        run: uv run --no-sync sphinx-build -W -b html docs/source docs/_build/html

  # Taplo (TOML formatter check) kept here for now; ITM-066 will fold into
  # justfile + add a dedicated workflow if needed.
  toml-format:
    name: toml-format-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        uses: extractions/setup-just@v4
      # `just install-taplo` now downloads the upstream pre-built binary
      # (curl + gunzip from https://github.com/tamasfe/taplo/releases) —
      # ~1-3s installed vs the prior ~2min `cargo install taplo-cli`. Same
      # path as local dev; no external installer action needed.
      - name: Install taplo
        run: just install-taplo
      - name: Check TOML formatting
        run: taplo check '**/*.toml'

  # WL-006 - single gate for branch protection. Require ONLY this check;
  # job renames/additions then never desync the required-checks list.
  # Skipped jobs (docs-only PRs, WL-019) count as success; anything that
  # failed or was cancelled fails the gate.
  ci-ok:
    name: ci-ok
    runs-on: ubuntu-latest
    needs: [changes, lint, typecheck, test, build-smoke, docs, toml-format]
    if: always()
    permissions: {}
    steps:
      - name: Check aggregate result
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          set -euo pipefail
          echo "job results: ${RESULTS}"
          for r in ${RESULTS}; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "FAIL: at least one required job did not succeed" >&2
              exit 1
            fi
          done
          echo "PASS: all required jobs succeeded or were skipped"
