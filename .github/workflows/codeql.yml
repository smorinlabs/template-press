# CodeQL static analysis (ITM-034 hardening + ITM-035 analyze job updates).
# Python-only matrix (decided round 5: no JS even with bun.lock).
# Scheduled weekly Sunday 04:00 UTC (decided round 5).
#
# Advanced setup: this workflow + .github/codeql/codeql-config.yml ARE the
# CodeQL config. The repo's "default setup" (Settings > Code security) must
# stay disabled, or the SARIF upload is rejected with a configuration error.
# See SECURITY.md > Code Scanning Setup. This applies to every fork too.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 0'  # weekly, Sunday 04:00 UTC

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Init CodeQL
        uses: github/codeql-action/init@v4.36.2
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml

      - name: Analyze
        uses: github/codeql-action/analyze@v4.36.2
        with:
          category: "/language:python"
