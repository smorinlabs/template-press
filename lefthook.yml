# ITM-003 — lefthook scaffolding. Hook manager per ADR-01.
# Stage blocks are intentionally absent — per-tool ITMs add them:
#   commit-msg:  ITM-040 (commitlint)
#   pre-commit:  ITM-001 (gitleaks), ITM-010 (editorconfig-checker),
#                ITM-013 (yamllint), ITM-016 (codespell), ITM-066 (ruff/ty/uv-export)
#   pre-push:    ITM-002 (gitleaks range scan), ITM-032 (bandit)
# See lefthook docs: https://lefthook.dev/configuration/

min_version: 1.13.0  # ITM-021 installer floor

# ITM-040 — commitlint commit-msg step. Decided round 7.
# Use the full package name `@commitlint/cli`, not bare `commitlint`. On a cold
# bun cache, `bunx --bun commitlint` is ambiguous (the bin and an unrelated
# mise shim share the name), and bun falls through to PATH where the mise
# shim wins and fails with "No version is set for shim: commitlint". Naming
# the scoped package up-front forces bun to resolve via npm before PATH.
commit-msg:
  commands:
    commitlint:
      run: bunx --bun @commitlint/cli --edit {1}

# Pre-commit stage — per-tool steps land via downstream ITMs.
pre-commit:
  parallel: true
  commands:
    # ITM-001 — gitleaks staged-diff scan (decided round 2).
    gitleaks:
      run: scripts/check-gitleaks.sh --staged
    # ITM-010 — editorconfig-checker staged-only (decided round 9).
    # The PyPI wheel bundles the Go binary (the npm wrapper downloads it at
    # runtime and flakes with TAR_BAD_ARCHIVE).
    # Note: the Go binary uses single-dash flags (-config, not --config).
    # WL-001: `uv run` (locked dev group), not floating `uvx` — hooks and CI
    # run the exact version in uv.lock.
    editorconfig-checker:
      run: >-
        uv run ec
        -config .editorconfig-checker.json
        {staged_files}
    # ITM-013 — yamllint staged YAML only (decided round 2).
    yamllint:
      glob: "*.{yml,yaml}"
      run: uv run yamllint -c .yamllint {staged_files}
    # ITM-016 — codespell staged files (decided round 9).
    codespell:
      run: uv run codespell --toml pyproject.toml {staged_files}
    # ITM-066 — ruff lint + format check on staged Python files.
    # Added after PR #319 hit lint failures in CI that should have been
    # caught locally. `{staged_files}` keeps the check scoped — fast.
    # `--force-exclude` so explicit staged paths still honor the
    # [tool.ruff] exclude list (e.g. docs/source/conf.py), matching CI's
    # `ruff check .` behavior.
    ruff-check:
      glob: "*.py"
      run: uv run ruff check --force-exclude --output-format=concise {staged_files}
    ruff-format:
      glob: "*.py"
      run: uv run ruff format --check --force-exclude {staged_files}

# Pre-push stage — per-tool steps land via downstream ITMs.
pre-push:
  parallel: true
  commands:
    # ITM-002 — gitleaks range scan (catches bypassed/imported commits).
    gitleaks-range:
      run: scripts/check-gitleaks.sh --range
    # ITM-032 — bandit (security linting) at pre-push (round-3 decision:
    # pre-push, not pre-commit, since full-tree scan is too slow per commit).
    # WL-001: locked via the dev group (`uv run`, not floating `uvx`).
    bandit:
      run: uv run bandit -r src/template_press/ -c pyproject.toml
